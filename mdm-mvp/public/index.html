<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathing MDM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- Login -->
  <div class="login-wrap" id="login-view">
    <form class="login-card" id="login-form">
      <div class="brand"><span class="logo">P</span><div><strong>Pathing MDM</strong><div class="muted" style="font-size:12px">VPathing Enterprise LLC</div></div></div>
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" value="admin@local" required>
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required>
      <div class="error" id="login-error"></div>
      <button class="primary" style="width:100%;margin-top:14px" type="submit">Sign in</button>
    </form>
  </div>

  <!-- App -->
  <div class="app" id="app-view">
    <aside class="sidebar">
      <div class="brand"><span class="logo">P</span><strong>Pathing MDM</strong></div>
      <span class="nav-item active" data-page="dashboard">Dashboard</span>
      <span class="nav-item" data-page="devices">Devices</span>
      <span class="nav-item" data-page="policies">Policies</span>
      <span class="nav-item" data-page="enroll">Enroll</span>
      <span class="spacer"></span>
      <span class="nav-item" id="logout">Sign out</span>
    </aside>
    <main class="main" id="main"></main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
